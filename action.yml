name: Microsoft Fabric Deploy
description: Plan and deploy Microsoft Fabric workspaces and data engineering workloads.
author: Microsoft Fabric community

branding:
  icon: upload-cloud
  color: blue

inputs:
  mode:
    description: Operation to perform. Supported values are validate, plan, and apply.
    required: false
    default: plan
  manifest:
    description: Path to the Fabric deployment manifest.
    required: false
    default: fabric/deployment.yaml
  environment:
    description: Logical deployment environment, such as dev, test, or prod.
    required: false
    default: dev
  workspace-id:
    description: Target Fabric workspace ID. Overrides workspace.id in the manifest.
    required: false
  variables:
    description: JSON object containing non-sensitive values used by ${var.NAME} substitutions.
    required: false
    default: "{}"
  auth-mode:
    description: Authentication mode. Supported values are none, oidc, and service-principal-secret.
    required: false
    default: none
  tenant-id:
    description: Microsoft Entra tenant ID used for Fabric authentication.
    required: false
  client-id:
    description: Microsoft Entra application client ID used for Fabric authentication.
    required: false
  client-secret:
    description: Client secret used only when auth-mode is service-principal-secret.
    required: false
  authority-host:
    description: Microsoft Entra authority host.
    required: false
    default: https://login.microsoftonline.com
  fabric-api-endpoint:
    description: Fabric REST API endpoint, configurable for private-network environments.
    required: false
    default: https://api.fabric.microsoft.com
  onelake-endpoint:
    description: OneLake DFS endpoint used for artifact directory operations.
    required: false
    default: https://onelake.dfs.fabric.microsoft.com
  onelake-blob-endpoint:
    description: OneLake Blob endpoint used for immutable artifact uploads. Derived from onelake-endpoint when omitted.
    required: false
  plan-file:
    description: Path where the current machine-readable deployment plan is written.
    required: false
    default: fabric-plan.json
  approved-plan-file:
    description: Previously generated plan required when mode is apply.
    required: false
  checkpoint-file:
    description: Resumable apply checkpoint path.
    required: false
    default: fabric-checkpoint.json
  result-file:
    description: Apply result path.
    required: false
    default: fabric-result.json
  allow-create:
    description: Allow apply mode to create Fabric items.
    required: false
    default: "false"
  allow-update:
    description: Allow apply mode to update Fabric items.
    required: false
    default: "false"
  allow-delete:
    description: Allow apply mode to soft-delete approved Fabric items.
    required: false
    default: "false"
  allow-lakehouse-data-loss:
    description: Permit approved Lakehouse deletion when allow-delete is also true.
    required: false
    default: "false"
  allow-lakehouse-schema-create:
    description: Permit approved Lakehouse schema creation in LakehouseTables bundles.
    required: false
    default: "false"
  allow-lakehouse-table-create:
    description: Permit approved managed Delta table creation in LakehouseTables bundles.
    required: false
    default: "false"
  allow-onelake-artifact-create:
    description: Permit approved immutable Spark Job artifact creation in OneLake.
    required: false
    default: "false"
  allow-tag-create:
    description: Permit approved Fabric tenant or domain tag creation.
    required: false
    default: "false"
  allow-tag-assign:
    description: Permit approved additive Fabric tag assignment to supported items.
    required: false
    default: "false"
  allow-workspace-create:
    description: Allow apply mode to create the managed Fabric workspace.
    required: false
    default: "false"
  allow-workspace-update:
    description: Allow apply mode to update managed Fabric workspace metadata.
    required: false
    default: "false"
  allow-capacity-assignment:
    description: Allow apply mode to assign the managed workspace to a Fabric capacity.
    required: false
    default: "false"
  return-livy-api-endpoint:
    description: Return deployed Lakehouse Livy API endpoints during apply.
    required: false
    default: "false"

outputs:
  status:
    description: Validation, planning, or apply result.
  plan-file:
    description: Path to the generated JSON plan.
  plan-hash:
    description: SHA-256 hash identifying the generated plan.
  approved-plan-hash:
    description: SHA-256 hash of the approved plan used by apply mode.
  source-hash:
    description: SHA-256 hash of the unresolved source manifest.
  item-count:
    description: Number of Fabric items in the deployment.
  create-count:
    description: Number of items planned for creation.
  update-count:
    description: Number of items planned for update.
  delete-count:
    description: Number of items planned for deletion.
  noop-count:
    description: Number of items with no detected changes.
  unknown-count:
    description: Number of items not yet supported by online discovery.
  workspace-id:
    description: Physical ID of the resolved or provisioned Fabric workspace.
  workspace-action:
    description: Planned action for the managed workspace.
  requires-item-replan:
    description: True when a new workspace was provisioned and child items require a fresh approved plan.
  result-file:
    description: Path to the apply result JSON.
  checkpoint-file:
    description: Path to the resumable apply checkpoint.
  applied-count:
    description: Number of items created, updated, or verified by apply.
  resumed-count:
    description: Number of previously completed items verified from a checkpoint.
  livy-api-endpoint:
    description: Livy API endpoint when exactly one Lakehouse is deployed and return-livy-api-endpoint is true.
  livy-api-endpoints:
    description: JSON map of Lakehouse logical IDs to Livy API endpoints when return-livy-api-endpoint is true.

runs:
  using: node24
  main: dist/index.js
