name: Microsoft Fabric Deploy
description: Plan and deploy Microsoft Fabric workspaces and data engineering workloads.
author: Microsoft Fabric community

branding:
  icon: upload-cloud
  color: blue

inputs:
  mode:
    description: Operation to perform. Supported values are validate, plan, and apply.
    required: false
    default: plan
  manifest:
    description: Path to the Fabric deployment manifest.
    required: false
    default: fabric/deployment.yaml
  environment:
    description: Logical deployment environment, such as dev, test, or prod.
    required: false
    default: dev
  workspace-id:
    description: Target Fabric workspace ID. Overrides workspace.id in the manifest.
    required: false
  variables:
    description: JSON object containing non-sensitive values used by ${var.NAME} substitutions.
    required: false
    default: "{}"
  auth-mode:
    description: Authentication mode. Supported values are none, oidc, and service-principal-secret.
    required: false
    default: none
  tenant-id:
    description: Microsoft Entra tenant ID used for Fabric authentication.
    required: false
  client-id:
    description: Microsoft Entra application client ID used for Fabric authentication.
    required: false
  client-secret:
    description: Client secret used only when auth-mode is service-principal-secret.
    required: false
  authority-host:
    description: Microsoft Entra authority host.
    required: false
    default: https://login.microsoftonline.com
  fabric-api-endpoint:
    description: Fabric REST API endpoint, configurable for private-network environments.
    required: false
    default: https://api.fabric.microsoft.com
  onelake-endpoint:
    description: OneLake DFS endpoint used for artifact directory operations.
    required: false
    default: https://onelake.dfs.fabric.microsoft.com
  onelake-blob-endpoint:
    description: OneLake Blob endpoint used for immutable artifact uploads. Derived from onelake-endpoint when omitted.
    required: false
  plan-file:
    description: Path where the current machine-readable deployment plan is written.
    required: false
    default: fabric-plan.json
  approved-plan-file:
    description: Previously generated plan required when mode is apply.
    required: false
  checkpoint-file:
    description: Resumable apply checkpoint path.
    required: false
    default: fabric-checkpoint.json
  result-file:
    description: Apply result path.
    required: false
    default: fabric-result.json
  allow-create:
    description: Allow apply mode to create Fabric items.
    required: false
    default: "false"
  allow-update:
    description: Allow apply mode to update Fabric items.
    required: false
    default: "false"
  allow-delete:
    description: Allow apply mode to soft-delete approved Fabric items.
    required: false
    default: "false"
  allow-lakehouse-data-loss:
    description: Permit approved Lakehouse deletion when allow-delete is also true.
    required: false
    default: "false"
  allow-lakehouse-schema-create:
    description: Permit approved Lakehouse schema creation in LakehouseTables bundles.
    required: false
    default: "false"
  allow-lakehouse-table-create:
    description: Permit approved managed Delta table creation in LakehouseTables bundles.
    required: false
    default: "false"
  allow-onelake-artifact-create:
    description: Permit approved immutable Spark Job artifact creation in OneLake.
    required: false
    default: "false"
  allow-tag-create:
    description: Permit approved Fabric tenant or domain tag creation.
    required: false
    default: "false"
  allow-tag-assign:
    description: Permit approved additive Fabric tag assignment to supported items.
    required: false
    default: "false"
  allow-workspace-create:
    description: Allow apply mode to create the managed Fabric workspace.
    required: false
    default: "false"
  allow-workspace-update:
    description: Allow apply mode to update managed Fabric workspace metadata.
    required: false
    default: "false"
  allow-capacity-assignment:
    description: Allow apply mode to assign the managed workspace to a Fabric capacity.
    required: false
    default: "false"
  allow-network-policy-update:
    description: Allow apply mode to update the workspace network communication policy.
    required: false
    default: "false"
  allow-network-policy-relaxation:
    description: Allow apply mode to relax an inbound or outbound Deny communication policy default action to Allow. Required in addition to allow-network-policy-update.
    required: false
    default: "false"
  allow-inbound-firewall-update:
    description: Allow apply mode to replace the complete preview workspace inbound IP firewall rule set.
    required: false
    default: "false"
  allow-inbound-azure-resource-rule-update:
    description: Allow apply mode to replace the complete preview workspace inbound Azure resource instance rule set.
    required: false
    default: "false"
  allow-inbound-external-data-share-policy-update:
    description: Allow apply mode to update the preview workspace inbound External Data Shares bypass policy.
    required: false
    default: "false"
  allow-inbound-external-data-share-policy-relaxation:
    description: Allow apply mode to enable the inbound External Data Shares bypass policy (an observed Deny -> desired Allow transition). Required in addition to allow-inbound-external-data-share-policy-update.
    required: false
    default: "false"
  acknowledge-firewall-lockout-risk:
    description: Acknowledge the lockout risk when an approved plan changes inbound public access from Allow to Deny. Required independently from all other network safeguards.
    required: false
    default: "false"
  allow-outbound-cloud-connection-rule-update:
    description: Allow apply mode to update outbound access protection cloud connection rules.
    required: false
    default: "false"
  allow-outbound-gateway-rule-update:
    description: Allow apply mode to update outbound access protection gateway rules.
    required: false
    default: "false"
  allow-managed-private-endpoint-create:
    description: Allow apply mode to create managed private endpoints.
    required: false
    default: "false"
  allow-managed-private-endpoint-delete:
    description: Allow apply mode to delete the exact approved managed private endpoint physical ID.
    required: false
    default: "false"
  return-livy-api-endpoint:
    description: Return deployed Lakehouse Livy API endpoints during apply.
    required: false
    default: "false"

outputs:
  status:
    description: Validation, planning, or apply result.
  plan-file:
    description: Path to the generated JSON plan.
  plan-hash:
    description: SHA-256 hash identifying the generated plan.
  approved-plan-hash:
    description: SHA-256 hash of the approved plan used by apply mode.
  source-hash:
    description: SHA-256 hash of the unresolved source manifest.
  item-count:
    description: Number of Fabric items in the deployment.
  create-count:
    description: Number of items planned for creation.
  update-count:
    description: Number of items planned for update.
  delete-count:
    description: Number of items planned for deletion.
  noop-count:
    description: Number of items with no detected changes.
  unknown-count:
    description: Number of items not yet supported by online discovery.
  workspace-id:
    description: Physical ID of the resolved or provisioned Fabric workspace.
  workspace-action:
    description: Planned action for the managed workspace.
  network-protection-action:
    description: Planned or applied action for the workspace network communication policy, or not-configured when networkProtection is absent from the manifest.
  inbound-firewall-action:
    description: Planned action for the preview workspace inbound IP firewall rules, or not-configured.
  inbound-firewall-rule-count:
    description: Number of approved inbound IP firewall rules.
  inbound-azure-resource-rule-action:
    description: Planned action for the preview workspace inbound Azure resource instance rules, or not-configured.
  inbound-azure-resource-rule-count:
    description: Number of approved inbound Azure resource instance rules.
  inbound-external-data-share-policy-action:
    description: Planned or applied action for the preview workspace inbound External Data Shares bypass policy, or not-configured.
  inbound-external-data-share-policy-default-action:
    description: Approved desired defaultAction (Allow or Deny) for the inbound External Data Shares bypass policy, or empty when not configured.
  managed-private-endpoint-count:
    description: Number of declared managed private endpoints.
  managed-private-endpoint-create-count:
    description: Number of managed private endpoints planned for creation.
  managed-private-endpoint-delete-count:
    description: Number of managed private endpoints planned for deletion.
  managed-private-endpoint-noop-count:
    description: Number of managed private endpoints requiring no lifecycle mutation.
  managed-private-endpoint-blocked-count:
    description: Number of managed private endpoint actions blocked by fail-closed planning.
  managed-private-endpoint-unknown-count:
    description: Number of managed private endpoint actions with unknown live state.
  managed-private-endpoint-applied-count:
    description: Number of managed private endpoint lifecycle operations applied or verified.
  managed-private-endpoint-resumed-count:
    description: Number of managed private endpoint operations resumed from checkpoint state.
  requires-item-replan:
    description: True when a new workspace was provisioned and child items require a fresh approved plan.
  result-file:
    description: Path to the apply result JSON.
  checkpoint-file:
    description: Path to the resumable apply checkpoint.
  applied-count:
    description: Number of items created, updated, or verified by apply.
  resumed-count:
    description: Number of previously completed items verified from a checkpoint.
  livy-api-endpoint:
    description: Livy API endpoint when exactly one Lakehouse is deployed and return-livy-api-endpoint is true.
  livy-api-endpoints:
    description: JSON map of Lakehouse logical IDs to Livy API endpoints when return-livy-api-endpoint is true.

runs:
  using: node24
  main: dist/index.js
