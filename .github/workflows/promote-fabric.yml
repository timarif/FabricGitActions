name: Promote Fabric Deployment

on:
  workflow_dispatch:
    inputs:
      target:
        description: Highest environment to deploy.
        required: true
        default: dev
        type: choice
        options:
          - dev
          - test
          - prod
      manifest:
        description: Deployment manifest path.
        required: true
        default: fabric/deployment.yaml
        type: string
      allow_create:
        required: true
        default: false
        type: boolean
      allow_update:
        required: true
        default: false
        type: boolean
      allow_delete:
        required: true
        default: false
        type: boolean
      allow_lakehouse_data_loss:
        required: true
        default: false
        type: boolean
      allow_workspace_create:
        required: true
        default: false
        type: boolean
      allow_workspace_update:
        required: true
        default: false
        type: boolean
      allow_capacity_assignment:
        required: true
        default: false
        type: boolean
      allow_lakehouse_schema_create:
        required: true
        default: false
        type: boolean
      allow_lakehouse_table_create:
        required: true
        default: false
        type: boolean
      allow_onelake_artifact_create:
        required: true
        default: false
        type: boolean
      allow_tag_create:
        required: true
        default: false
        type: boolean
      allow_tag_assign:
        required: true
        default: false
        type: boolean
      allow_network_policy_update:
        required: true
        default: false
        type: boolean
      allow_network_policy_relaxation:
        required: true
        default: false
        type: boolean
      allow_inbound_firewall_update:
        required: true
        default: false
        type: boolean
      acknowledge_firewall_lockout_risk:
        required: true
        default: false
        type: boolean
      allow_outbound_cloud_connection_rule_update:
        required: true
        default: false
        type: boolean
      allow_outbound_gateway_rule_update:
        required: true
        default: false
        type: boolean
      allow_managed_private_endpoint_create:
        required: true
        default: false
        type: boolean
      allow_managed_private_endpoint_delete:
        required: true
        default: false
        type: boolean

permissions:
  actions: read
  contents: read
  id-token: write

jobs:
  dev:
    uses: ./.github/workflows/reusable-fabric-deploy.yml
    with:
      github_environment: fabric-dev
      deployment_environment: dev
      manifest: ${{ inputs.manifest }}
      workspace_id: ${{ vars.FABRIC_DEV_WORKSPACE_ID }}
      variables: ${{ vars.FABRIC_DEV_VARIABLES_JSON || '{}' }}
      tenant_id: ${{ vars.FABRIC_TENANT_ID }}
      client_id: ${{ vars.FABRIC_CLIENT_ID }}
      allow_create: ${{ inputs.allow_create }}
      allow_update: ${{ inputs.allow_update }}
      allow_delete: ${{ inputs.allow_delete }}
      allow_lakehouse_data_loss: ${{ inputs.allow_lakehouse_data_loss }}
      allow_workspace_create: ${{ inputs.allow_workspace_create }}
      allow_workspace_update: ${{ inputs.allow_workspace_update }}
      allow_capacity_assignment: ${{ inputs.allow_capacity_assignment }}
      allow_lakehouse_schema_create: ${{ inputs.allow_lakehouse_schema_create }}
      allow_lakehouse_table_create: ${{ inputs.allow_lakehouse_table_create }}
      allow_onelake_artifact_create: ${{ inputs.allow_onelake_artifact_create }}
      allow_tag_create: ${{ inputs.allow_tag_create }}
      allow_tag_assign: ${{ inputs.allow_tag_assign }}
      allow_network_policy_update: ${{ inputs.allow_network_policy_update }}
      allow_network_policy_relaxation: ${{ inputs.allow_network_policy_relaxation }}
      allow_inbound_firewall_update: ${{ inputs.allow_inbound_firewall_update }}
      acknowledge_firewall_lockout_risk: ${{ inputs.acknowledge_firewall_lockout_risk }}
      allow_outbound_cloud_connection_rule_update: ${{ inputs.allow_outbound_cloud_connection_rule_update }}
      allow_outbound_gateway_rule_update: ${{ inputs.allow_outbound_gateway_rule_update }}
      allow_managed_private_endpoint_create: ${{ inputs.allow_managed_private_endpoint_create }}
      allow_managed_private_endpoint_delete: ${{ inputs.allow_managed_private_endpoint_delete }}

  test:
    if: ${{ success() && (inputs.target == 'test' || inputs.target == 'prod') }}
    needs: dev
    uses: ./.github/workflows/reusable-fabric-deploy.yml
    with:
      github_environment: fabric-test
      deployment_environment: test
      manifest: ${{ inputs.manifest }}
      workspace_id: ${{ vars.FABRIC_TEST_WORKSPACE_ID }}
      variables: ${{ vars.FABRIC_TEST_VARIABLES_JSON || '{}' }}
      tenant_id: ${{ vars.FABRIC_TENANT_ID }}
      client_id: ${{ vars.FABRIC_CLIENT_ID }}
      allow_create: ${{ inputs.allow_create }}
      allow_update: ${{ inputs.allow_update }}
      allow_delete: ${{ inputs.allow_delete }}
      allow_lakehouse_data_loss: ${{ inputs.allow_lakehouse_data_loss }}
      allow_workspace_create: ${{ inputs.allow_workspace_create }}
      allow_workspace_update: ${{ inputs.allow_workspace_update }}
      allow_capacity_assignment: ${{ inputs.allow_capacity_assignment }}
      allow_lakehouse_schema_create: ${{ inputs.allow_lakehouse_schema_create }}
      allow_lakehouse_table_create: ${{ inputs.allow_lakehouse_table_create }}
      allow_onelake_artifact_create: ${{ inputs.allow_onelake_artifact_create }}
      allow_tag_create: ${{ inputs.allow_tag_create }}
      allow_tag_assign: ${{ inputs.allow_tag_assign }}
      allow_network_policy_update: ${{ inputs.allow_network_policy_update }}
      allow_network_policy_relaxation: ${{ inputs.allow_network_policy_relaxation }}
      allow_inbound_firewall_update: ${{ inputs.allow_inbound_firewall_update }}
      acknowledge_firewall_lockout_risk: ${{ inputs.acknowledge_firewall_lockout_risk }}
      allow_outbound_cloud_connection_rule_update: ${{ inputs.allow_outbound_cloud_connection_rule_update }}
      allow_outbound_gateway_rule_update: ${{ inputs.allow_outbound_gateway_rule_update }}
      allow_managed_private_endpoint_create: ${{ inputs.allow_managed_private_endpoint_create }}
      allow_managed_private_endpoint_delete: ${{ inputs.allow_managed_private_endpoint_delete }}

  prod:
    if: ${{ success() && inputs.target == 'prod' }}
    needs: test
    uses: ./.github/workflows/reusable-fabric-deploy.yml
    with:
      github_environment: fabric-prod
      deployment_environment: prod
      manifest: ${{ inputs.manifest }}
      workspace_id: ${{ vars.FABRIC_PROD_WORKSPACE_ID }}
      variables: ${{ vars.FABRIC_PROD_VARIABLES_JSON || '{}' }}
      tenant_id: ${{ vars.FABRIC_TENANT_ID }}
      client_id: ${{ vars.FABRIC_CLIENT_ID }}
      allow_create: ${{ inputs.allow_create }}
      allow_update: ${{ inputs.allow_update }}
      allow_delete: ${{ inputs.allow_delete }}
      allow_lakehouse_data_loss: ${{ inputs.allow_lakehouse_data_loss }}
      allow_workspace_create: ${{ inputs.allow_workspace_create }}
      allow_workspace_update: ${{ inputs.allow_workspace_update }}
      allow_capacity_assignment: ${{ inputs.allow_capacity_assignment }}
      allow_lakehouse_schema_create: ${{ inputs.allow_lakehouse_schema_create }}
      allow_lakehouse_table_create: ${{ inputs.allow_lakehouse_table_create }}
      allow_onelake_artifact_create: ${{ inputs.allow_onelake_artifact_create }}
      allow_tag_create: ${{ inputs.allow_tag_create }}
      allow_tag_assign: ${{ inputs.allow_tag_assign }}
      allow_network_policy_update: ${{ inputs.allow_network_policy_update }}
      allow_network_policy_relaxation: ${{ inputs.allow_network_policy_relaxation }}
      allow_inbound_firewall_update: ${{ inputs.allow_inbound_firewall_update }}
      acknowledge_firewall_lockout_risk: ${{ inputs.acknowledge_firewall_lockout_risk }}
      allow_outbound_cloud_connection_rule_update: ${{ inputs.allow_outbound_cloud_connection_rule_update }}
      allow_outbound_gateway_rule_update: ${{ inputs.allow_outbound_gateway_rule_update }}
      allow_managed_private_endpoint_create: ${{ inputs.allow_managed_private_endpoint_create }}
      allow_managed_private_endpoint_delete: ${{ inputs.allow_managed_private_endpoint_delete }}
