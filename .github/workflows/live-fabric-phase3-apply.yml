name: Live Fabric Phase 3 Apply

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type APPLY to deploy the Phase 3 live fixture.
        required: true
        default: PLAN_ONLY
        type: string
      allow_create:
        description: Permit creation when the approved plan requires it.
        required: true
        default: false
        type: boolean
      allow_update:
        description: Permit update when the approved plan requires it.
        required: true
        default: false
        type: boolean
      allow_delete:
        description: Permit approved soft deletion.
        required: true
        default: false
        type: boolean
      allow_lakehouse_data_loss:
        description: Permit approved Lakehouse deletion.
        required: true
        default: false
        type: boolean
      allow_lakehouse_schema_create:
        description: Permit approved Lakehouse schema creation.
        required: true
        default: false
        type: boolean
      allow_lakehouse_table_create:
        description: Permit approved Lakehouse managed Delta table creation.
        required: true
        default: false
        type: boolean

permissions:
  actions: read
  contents: read
  id-token: write

concurrency:
  group: live-fabric-phase3-${{ vars.FABRIC_WORKSPACE_ID }}
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      approved-plan-artifact: ${{ steps.plan-artifact.outputs.name }}
      recovery-checkpoint-artifact: ${{ steps.plan-artifact.outputs.recovery-name }}

    steps:
      - uses: actions/checkout@v5

      - name: Create approved Fabric plan
        if: ${{ github.run_attempt == 1 }}
        id: fabric-plan
        uses: ./
        with:
          mode: plan
          manifest: examples/live-phase3/fabric/deployment.yaml
          environment: live-test
          workspace-id: ${{ vars.FABRIC_WORKSPACE_ID }}
          auth-mode: oidc
          tenant-id: ${{ vars.FABRIC_TENANT_ID }}
          client-id: ${{ vars.FABRIC_CLIENT_ID }}
          plan-file: approved-plan/fabric-plan.json

      - name: Restore original plan and latest checkpoint
        if: ${{ github.run_attempt > 1 }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p artifact-restore approved-plan recovery

          gh api --paginate --slurp \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${REPOSITORY}/actions/runs/${RUN_ID}/artifacts?per_page=100" \
            > artifact-restore/pages.json
          jq '{artifacts: [.[].artifacts[]]}' \
            artifact-restore/pages.json \
            > artifact-restore/artifacts.json

          approved_prefix="approved-phase3-plan-${RUN_ID}-"
          apply_prefix="phase3-apply-result-${RUN_ID}-"
          if [[ ! "$RUN_ATTEMPT" =~ ^[0-9]+$ ]] || (( RUN_ATTEMPT <= 1 )); then
            echo "Invalid rerun attempt '${RUN_ATTEMPT}'." >&2
            exit 1
          fi
          expected_checkpoint_attempt=$((10#$RUN_ATTEMPT - 1))
          expected_approved_name="${approved_prefix}1"
          approved_row="$(
            jq -er \
              --arg name "$expected_approved_name" '
                [
                  .artifacts[]
                  | select(.expired == false)
                  | select(.name == $name)
                ]
                | if length == 1
                  then [.[0].archive_download_url, 1] | @tsv
                  else error("Expected exactly one unexpired approved plan artifact from attempt 1")
                  end
              ' artifact-restore/artifacts.json
          )"
          expected_checkpoint_name="${apply_prefix}${expected_checkpoint_attempt}"
          checkpoint_row="$(
            jq -er \
              --arg name "$expected_checkpoint_name" \
              --argjson expected "$expected_checkpoint_attempt" '
                [
                  .artifacts[]
                  | select(.expired == false)
                  | select(.name == $name)
                ]
                | if length == 1
                  then [.[0].archive_download_url, $expected] | @tsv
                  else error("Expected exactly one checkpoint artifact from the immediately preceding attempt")
                  end
              ' artifact-restore/artifacts.json
          )"

          IFS=$'\t' read -r approved_url approved_attempt <<< "$approved_row"
          IFS=$'\t' read -r checkpoint_url checkpoint_attempt <<< "$checkpoint_row"
          test -n "$approved_url"
          test -n "$checkpoint_url"

          curl --fail-with-body --location --silent --show-error \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --output artifact-restore/approved.zip \
            "$approved_url"
          curl --fail-with-body --location --silent --show-error \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --output artifact-restore/checkpoint.zip \
            "$checkpoint_url"
          unzip -q artifact-restore/approved.zip \
            -d artifact-restore/approved
          unzip -q artifact-restore/checkpoint.zip \
            -d artifact-restore/checkpoint

          mapfile -d '' approved_files < <(
            find artifact-restore/approved -type f \
              -name fabric-plan.json -print0
          )
          mapfile -d '' checkpoint_files < <(
            find artifact-restore/checkpoint -type f \
              -name checkpoint.json -print0
          )
          test "${#approved_files[@]}" -eq 1
          test "${#checkpoint_files[@]}" -eq 1
          cp -- "${approved_files[0]}" approved-plan/fabric-plan.json
          cp -- "${checkpoint_files[0]}" recovery/checkpoint.json
          printf 'Restored approved plan from attempt %s and checkpoint from attempt %s.\n' \
            "$approved_attempt" "$checkpoint_attempt"

      - name: Verify approved plan
        shell: bash
        run: |
          set -euo pipefail
          jq -e '
            (.items | length) == 6
            and (.items | map(.type) | sort)
              == ["Environment", "Lakehouse", "Lakehouse", "LakehouseTables", "Notebook", "SparkJobDefinition"]
            and all(
              .items[];
              .action == "create"
              or .action == "update"
              or .action == "no-op"
            )
          ' approved-plan/fabric-plan.json

      - name: Record approved plan artifact
        id: plan-artifact
        shell: bash
        run: |
          echo "name=approved-phase3-plan-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            >> "$GITHUB_OUTPUT"
          echo "recovery-name=phase3-recovery-checkpoint-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            >> "$GITHUB_OUTPUT"

      - name: Upload approved plan
        uses: actions/upload-artifact@v5
        with:
          name: ${{ steps.plan-artifact.outputs.name }}
          path: approved-plan/fabric-plan.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload recovered checkpoint
        if: ${{ github.run_attempt > 1 }}
        uses: actions/upload-artifact@v5
        with:
          name: ${{ steps.plan-artifact.outputs.recovery-name }}
          path: recovery/checkpoint.json
          if-no-files-found: error
          retention-days: 14

  apply:
    if: ${{ inputs.confirmation == 'APPLY' }}
    needs: plan
    runs-on: ubuntu-latest
    environment: fabric-live-apply

    steps:
      - uses: actions/checkout@v5

      - name: Download approved plan
        uses: actions/download-artifact@v5
        with:
          name: ${{ needs.plan.outputs.approved-plan-artifact }}
          path: approved-plan

      - name: Download recovered checkpoint
        if: ${{ github.run_attempt > 1 }}
        uses: actions/download-artifact@v5
        with:
          name: ${{ needs.plan.outputs.recovery-checkpoint-artifact }}
          path: recovered-checkpoint

      - name: Restore checkpoint for apply
        if: ${{ github.run_attempt > 1 }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p apply-output
          mapfile -d '' checkpoint_files < <(
            find recovered-checkpoint -type f \
              -name checkpoint.json -print0
          )
          test "${#checkpoint_files[@]}" -eq 1
          cp -- "${checkpoint_files[0]}" apply-output/checkpoint.json

      - name: Apply approved Fabric plan
        id: fabric-apply
        uses: ./
        with:
          mode: apply
          manifest: examples/live-phase3/fabric/deployment.yaml
          environment: live-test
          workspace-id: ${{ vars.FABRIC_WORKSPACE_ID }}
          auth-mode: oidc
          tenant-id: ${{ vars.FABRIC_TENANT_ID }}
          client-id: ${{ vars.FABRIC_CLIENT_ID }}
          approved-plan-file: approved-plan/fabric-plan.json
          allow-create: ${{ inputs.allow_create }}
          allow-update: ${{ inputs.allow_update }}
          allow-delete: ${{ inputs.allow_delete }}
          allow-lakehouse-data-loss: ${{ inputs.allow_lakehouse_data_loss }}
          allow-lakehouse-schema-create: ${{ inputs.allow_lakehouse_schema_create }}
          allow-lakehouse-table-create: ${{ inputs.allow_lakehouse_table_create }}
          plan-file: apply-output/current-plan.json
          checkpoint-file: apply-output/checkpoint.json
          result-file: apply-output/result.json

      - name: Upload apply artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v5
        with:
          name: phase3-apply-result-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            apply-output/current-plan.json
            apply-output/checkpoint.json
            apply-output/result.json
          if-no-files-found: warn
          retention-days: 14
