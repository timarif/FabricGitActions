name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run check
      - run: npm run package
      - name: Verify committed distribution
        run: git diff --exit-code -- dist

      - name: Exercise packaged action in plan mode
        id: plan
        uses: ./
        with:
          mode: plan
          manifest: examples/basic/fabric/deployment.yaml
          environment: ci
          workspace-id: 00000000-0000-0000-0000-000000000001
          plan-file: test-output/fabric-plan.json

      - name: Verify packaged action outputs
        shell: bash
        run: |
          test "${{ steps.plan.outputs.status }}" = "planned"
          test "${{ steps.plan.outputs.item-count }}" = "5"
          test -s test-output/fabric-plan.json

      - name: Exercise packaged action in validate mode
        uses: ./
        with:
          mode: validate
          manifest: examples/basic/fabric/deployment.yaml
          workspace-id: 00000000-0000-0000-0000-000000000001

      - name: Validate live Lakehouse example
        uses: ./
        with:
          mode: validate
          manifest: examples/live-lakehouse/fabric/deployment.yaml
          workspace-id: 00000000-0000-0000-0000-000000000001
          variables: '{"LAKEHOUSE_DESCRIPTION":"CI example validation"}'

      - name: Validate Phase 3 example
        uses: ./
        with:
          mode: validate
          manifest: examples/live-phase3/fabric/deployment.yaml
          workspace-id: 00000000-0000-0000-0000-000000000001

      - name: Validate live pipeline example
        uses: ./
        with:
          mode: validate
          manifest: examples/live-pipeline/fabric/deployment.yaml
          workspace-id: 00000000-0000-0000-0000-000000000001

      - name: Validate managed workspace example
        uses: ./
        with:
          mode: validate
          manifest: examples/workspace/fabric/deployment.yaml
          variables: >-
            {"WORKSPACE_NAME":"CI Managed Workspace","FABRIC_CAPACITY_ID":"00000000-0000-0000-0000-000000000002"}

      - name: Validate Fabric tags example
        uses: ./
        with:
          mode: validate
          manifest: examples/tags/fabric/deployment.yaml
          workspace-id: 00000000-0000-0000-0000-000000000001

      - name: Validate guarded deletion example
        uses: ./
        with:
          mode: validate
          manifest: examples/deletion/fabric/deployment.yaml
          variables: '{"FABRIC_WORKSPACE_ID":"00000000-0000-0000-0000-000000000001"}'

      - name: Validate network protection example
        uses: ./
        with:
          mode: validate
          manifest: examples/network-protection/fabric/deployment.yaml
          variables: >-
            {"FABRIC_WORKSPACE_ID":"00000000-0000-0000-0000-000000000001","FABRIC_GATEWAY_ID":"00000000-0000-0000-0000-000000000003"}
