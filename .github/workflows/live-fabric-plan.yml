name: Live Fabric Plan

on:
  workflow_dispatch:
    inputs:
      probe_inbound_firewall:
        description: Run only the read-only preview inbound firewall, Azure resource instance rule, and External Data Shares policy planning probe. This never applies changes.
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  plan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5

      - name: Plan against Fabric
        if: ${{ inputs.probe_inbound_firewall == false }}
        id: fabric-plan
        uses: ./
        with:
          mode: plan
          manifest: examples/live-lakehouse/fabric/deployment.yaml
          environment: live-test
          workspace-id: ${{ vars.FABRIC_WORKSPACE_ID }}
          variables: '{"LAKEHOUSE_DESCRIPTION":"Live Fabric planning validation"}'
          auth-mode: oidc
          tenant-id: ${{ vars.FABRIC_TENANT_ID }}
          client-id: ${{ vars.FABRIC_CLIENT_ID }}
          plan-file: live-output/fabric-plan.json

      - name: Verify live Lakehouse classification
        if: ${{ inputs.probe_inbound_firewall == false }}
        shell: bash
        run: |
          test "${{ steps.fabric-plan.outputs.item-count }}" = "1"
          jq -e '
            .items[]
            | select(.type == "Lakehouse")
            | .action == "create"
              or .action == "update"
              or .action == "no-op"
              or .action == "blocked"
          ' live-output/fabric-plan.json

      - name: Read-only inbound network plan probe
        if: ${{ inputs.probe_inbound_firewall }}
        id: firewall-plan
        uses: ./
        with:
          mode: plan
          manifest: examples/inbound-firewall-probe/fabric/deployment.yaml
          environment: live-firewall-readonly
          workspace-id: ${{ vars.FABRIC_WORKSPACE_ID }}
          auth-mode: oidc
          tenant-id: ${{ vars.FABRIC_TENANT_ID }}
          client-id: ${{ vars.FABRIC_CLIENT_ID }}
          plan-file: live-output/inbound-firewall-plan.json

      - name: Verify read-only inbound network probe
        if: ${{ inputs.probe_inbound_firewall }}
        shell: bash
        run: |
          set -euo pipefail
          jq -e '
            .networkProtection.communicationPolicy.desiredInboundDefaultAction == "Allow"
            and .networkProtection.inboundFirewallRules.ruleCount == 1
            and (
              .networkProtection.inboundFirewallRules.action == "update"
              or .networkProtection.inboundFirewallRules.action == "no-op"
            )
            and .networkProtection.inboundAzureResourceRules.ruleCount == 1
            and (
              .networkProtection.inboundAzureResourceRules.action == "update"
              or .networkProtection.inboundAzureResourceRules.action == "no-op"
            )
            and .networkProtection.inboundExternalDataSharesPolicy.desiredDefaultAction == "Deny"
            and (
              .networkProtection.inboundExternalDataSharesPolicy.action == "update"
              or .networkProtection.inboundExternalDataSharesPolicy.action == "no-op"
            )
          ' live-output/inbound-firewall-plan.json

      - name: Upload live plan
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: live-fabric-plan
          path: live-output
          if-no-files-found: error
