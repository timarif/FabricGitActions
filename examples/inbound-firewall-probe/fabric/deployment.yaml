apiVersion: fabric.deploy/v1alpha1
kind: FabricDeployment

metadata:
  deploymentId: fabric-inbound-firewall-readonly-probe

# This fixture is intentionally plan-only for GitHub-hosted runners. It reads
# the live communication policy and preview firewall configuration but keeps
# inbound public access at Allow and must never be used by a live apply job.
networkProtection:
  communicationPolicy:
    inboundDefaultAction: Allow
    outboundDefaultAction: Allow
  inboundFirewallRules:
    rules:
      - displayName: readonly-plan-probe
        value: 12.34.56.78

items: []
