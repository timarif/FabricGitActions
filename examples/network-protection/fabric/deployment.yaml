apiVersion: fabric.deploy/v1alpha1
kind: FabricDeployment

metadata:
  deploymentId: fabric-network-protection-example

workspace:
  id: ${var.FABRIC_WORKSPACE_ID}

# Stages a complete preview inbound IP firewall allow list while public inbound
# access remains Allow, and tightens outbound access protection (OAP).
# Outbound cloud connection and gateway rules may only be declared while
# outboundDefaultAction is Deny; apply lands the master policy switch and the
# configured allow lists together as one approved mutation. The declared
# managed private endpoint makes this a guarded two-plan rollout: first create
# and approve the endpoint, then replan before OAP can tighten to Deny.
networkProtection:
  communicationPolicy:
    inboundDefaultAction: Allow
    outboundDefaultAction: Deny
  inboundFirewallRules:
    rules:
      - displayName: corporate-egress
        value: 12.34.56.78
      - displayName: partner-range
        value: 23.45.67.80-23.45.67.89
      - displayName: vpn-cidr
        value: 34.56.78.0/24
  outboundCloudConnectionRules:
    defaultAction: Deny
    rules:
      - connectionType: Web
        defaultAction: Allow
      - connectionType: Sql
        defaultAction: Deny
        allowedEndpoints:
          - hostnamePattern: "*.database.windows.net"
  outboundGatewayRules:
    defaultAction: Deny
    allowedGateways:
      - id: ${var.FABRIC_GATEWAY_ID}
  managedPrivateEndpoints:
    - name: example-storage-blob
      targetPrivateLinkResourceId: ${var.PRIVATE_LINK_RESOURCE_ID}
      targetSubresourceType: blob
      requestMessage: Approve Fabric access to the example storage account

items:
  - logicalId: bronze
    type: Lakehouse
    path: items/lakehouses/bronze
